services:
  rdf4j:
    image: eclipse/rdf4j-workbench:5.1.0
    container_name: rdf4j_server
    ports:
      - "8181:8080"
    volumes:
      - rdf4j-data:/var/rdf4j

  neo4j:
    image: graphstack/dozerdb:5.20.0.0-alpha.1
    container_name: neo4j_server
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/secretserver
      - NEO4J_dbms_security_auth__enabled=true
      - NEO4J_PLUGINS=["apoc","n10s"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,n10s.*
      - NEO4J_db_transaction_timeout=600s
      - NEO4J_db_lock_acquisition_timeout=600s
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - CLASSPATH_PREFIX=/neo4j/lib/dozerdb-plugin-5.20.0.0.jar
    volumes:
      - ./neo4j-root/data:/data
      - ./neo4j-root/logs:/logs
      - ./neo4j-root/plugins:/plugins
      - ./neo4j-root/conf:/conf
      - ../data/Spider4SSC:/import/Spider4SSC:ro

volumes:
  rdf4j-data:
