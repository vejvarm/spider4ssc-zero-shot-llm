services:
  rdf4j:
    image: eclipse/rdf4j-workbench:4.3.16
    container_name: rdf4j_server
    ports:
      - "8181:8080"
    volumes:
      - ./rdf4j-data:/var/rdf4j

  neo4j:
    image: neo4j:4.4.38-enterprise
    container_name: neo4j_server
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/secretserver
      - NEO4J_dbms_security_auth__enabled=true
      - NEO4JLABS_PLUGINS=["n10s"]
      - NEO4J_dbms_security_procedures_unrestricted=n10s.*
      - NEO4J_dbms_security_procedures_allowlist=n10s.*
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - ./neo4j-data:/data
      - ../data/Spider4SSC/database_test:/var/lib/neo4j/import/database_test:ro
